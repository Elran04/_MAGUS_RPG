[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths - Centralized root tests folder with subdirectories
# tests/pygame/ - MAGUS_pygame tests (198 tests)
# tests/gamemaster_tools/ - Gamemaster_tools tests (6 tests)
testpaths = tests

# Output options and coverage configuration
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    # --cov=MAGUS_pygame
    # --cov=Gamemaster_tools
    # --cov-report=html
    # --cov-report=term-missing
    # --cov-report=json

# Markers for test categorization
markers =
    smoke: Quick smoke tests for core functionality
    integration: Integration tests requiring full setup
    unit: Unit tests for isolated components
    slow: Tests that take significant time to run

# Ignore patterns
norecursedirs = .git .venv __pycache__ old_system .backups

# Logging
log_cli = false
log_cli_level = INFO
