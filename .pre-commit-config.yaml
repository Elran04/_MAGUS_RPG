repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.13
        args: ['--line-length=100']
        stages: [manual]  # Run manually; avoid auto-format on first commits
        files: '^(MAGUS_pygame|Gamemaster_tools)/.*\.py$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
        files: '^(MAGUS_pygame|Gamemaster_tools)/.*\.py$'
        stages: [manual]  # Only run manually, not on every commit

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: '^(MAGUS_pygame|Gamemaster_tools)/.*\.py$'
        args: ['--ignore-missing-imports', '--check-untyped-defs']
        additional_dependencies:
          - pydantic>=2.12.3
        stages: [manual]  # Only run manually, not on every commit

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: '^(MAGUS_pygame|Gamemaster_tools)/.*\.(py|md|json)$'
      - id: end-of-file-fixer
        files: '^(MAGUS_pygame|Gamemaster_tools)/.*\.(py|md|json)$'
      - id: check-yaml
        exclude: 'mkdocs\.yml$'  # MkDocs uses custom YAML tags
      - id: check-json
        files: '^(characters|data)/.*\.json$'
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']
        files: '^(MAGUS_pygame|Gamemaster_tools)/.*\.py$'
